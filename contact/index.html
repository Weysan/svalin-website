<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Svalin | AI Governance Platform</title>
  <meta name="description" content="Get in touch with the Svalin team. Contact us for questions about AI governance, partnerships, or to request a demo." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://www.svalinhq.com/contact" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand">
        <img src="/assets/logo.svg" alt="Svalin logo" class="nav__logo" />
        <span class="nav__wordmark">Svalin</span>
      </a>
      <div class="nav__links" id="navLinks">
        <a href="/" class="nav__link">Home</a>
        <a href="/demo" class="nav__cta">Request a Demo</a>
      </div>
      <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main class="info-page">
    <div class="container">
      <div class="info-page__content">
        <h1 class="info-page__title">Contact Us</h1>
        <p class="info-page__meta">We'd love to hear from you. Reach out through any of the channels below.</p>

        <div class="contact__grid">
          <div class="contact__card">
            <div class="contact__card-icon">
              <i class="ph ph-envelope-simple" style="font-size: 24px;"></i>
            </div>
            <h2 class="contact__card-title">Get in Touch</h2>
            <p class="contact__card-text">
              <a href="mailto:hello@svalinhq.com">hello@svalinhq.com</a>
            </p>
          </div>
          <div class="contact__card">
            <div class="contact__card-icon">
              <i class="ph ph-chat-circle-dots" style="font-size: 24px;"></i>
            </div>
            <h2 class="contact__card-title">Request a Demo</h2>
            <p class="contact__card-text">
              <a href="/demo">Fill out our demo form</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="border-top: none; padding-top: 0;">
        <span>&copy; 2026 Svalin. All rights reserved.</span>
        <div>
          <a href="/privacy" class="footer__link" style="margin-right: 1rem;">Privacy Policy</a>
          <a href="/terms" class="footer__link">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
