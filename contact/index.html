<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Get in touch with the Svalin team. Contact us for questions about AI governance, partnerships, or to request a demo." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://www.svalinhq.com/contact" />
</head>
<body class="demo-page">

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand">
        <img src="/assets/logo.svg" alt="Svalin logo" class="nav__logo" />
        <span class="nav__wordmark">Svalin</span>
      </a>
      <div class="nav__links" id="navLinks">
        <a href="/" class="nav__link">Home</a>
        <a href="/demo" class="nav__cta">Request a Demo</a>
      </div>
      <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="demo-page__content">
    <div class="container">
      <div class="demo-page__wrapper">
        <h1 class="demo-page__title">Contact Us</h1>
        <p class="demo-page__subtitle">
          Have a question about Svalin? Fill in the form below and we'll get back to you.
        </p>
        <div class="demo-page__iframe-wrapper">
          <iframe
            src="https://tally.so/embed/7RvxM2?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
            title="Contact Form"
            loading="lazy"
            width="100%"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
          >
            Loading form...
          </iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="border-top: none; padding-top: 0;">
        <span>&copy; 2026 Svalin. All rights reserved.</span>
        <div>
          <a href="/privacy" class="footer__link" style="margin-right: 1rem;">Privacy Policy</a>
          <a href="/terms" class="footer__link">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://tally.so/widgets/embed.js"></script>
  <script src="/js/main.js"></script>
