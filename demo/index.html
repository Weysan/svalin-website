<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Demo — Svalin | AI Governance Platform</title>
  <meta name="description" content="Request a demo of Svalin, the AI governance platform. See how you can audit, observe, and govern AI usage across your organisation." />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
</head>
<body class="demo-page">

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand">
        <img src="/assets/logo.svg" alt="Svalin logo" class="nav__logo" />
        <span class="nav__wordmark">Svalin</span>
      </a>
      <div class="nav__links" id="navLinks">
        <a href="/" class="nav__link">Back to Home</a>
      </div>
      <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="demo-page__content">
    <div class="container">
      <div class="demo-page__wrapper">
        <h1 class="demo-page__title">Request a Demo</h1>
        <p class="demo-page__subtitle">
          Fill in the form below and our team will reach out to schedule a personalised walkthrough of Svalin.
        </p>
        <div class="demo-page__iframe-wrapper">
          <!-- Replace the src below with your Google Form embed URL -->
          <iframe
            src="about:blank"
            title="Demo Request Form"
            loading="lazy"
            data-placeholder="Replace this src with your Google Form embed URL, e.g.: https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true"
          >
            Loading form...
          </iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="border-top: none; padding-top: 0;">
        <span>&copy; 2026 Svalin. All rights reserved.</span>
        <div>
          <a href="/privacy" class="footer__link" style="margin-right: 1rem;">Privacy Policy</a>
          <a href="/terms" class="footer__link">Terms of Service</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>

</html>
